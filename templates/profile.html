<h1>{{ profile_user.username }}'s Profile</h1>

{% if profile_user.profile_picture %}
    <img src="{{ profile_user.profile_picture.url }}" width="150">
{% else %}
    <p>No profile picture uploaded.</p>
{% endif %}

<p><strong>Bio:</strong> {{ profile_user.bio|default:"No bio yet." }}</p>

{% if user == profile_user %}
    <a href="{% url 'profile_edit' %}">Edit my profile</a>
{% endif %}
