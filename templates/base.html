<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ChatVault</title>
    <style>
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #4CAF50;
            padding: 10px 20px;
        }

        nav span.brand {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .profile-menu {
            position: relative;
            cursor: pointer;
        }

        .profile-menu span {
            color: white;
            font-size: 16px;
        }

        .dropdown {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
            border-radius: 4px;
            z-index: 1;
        }

        .dropdown a {
            display: block;
            padding: 10px 16px;
            text-decoration: none;
            color: #333;
        }

        .dropdown a:hover {
            background-color: #f1f1f1;
        }

        .profile-menu:hover .dropdown {
            display: block;
        }
    </style>
</head>
<body>

    <nav>
        <span class="brand">ChatVault</span>

        <div class="profile-menu">
            <span>{{ request.user.username }} ▾</span>
            <div class="dropdown">
                <a href="{% url 'profile' username=request.user.username %}">Profile</a>
                <a href="{% url 'profile_edit' %}">Edit Profile</a>
                <a href="{% url 'logout' %}" onclick="return confirm('Are you sure you want to logout?')">Logout</a>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

</body>
</html>
